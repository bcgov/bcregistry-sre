name: Frontend Application CI

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "24"
      pnpm_version:
        type: string
        default: "9"
      app_name:
        required: true
        type: string
      working_directory:
        type: string
        default: "."
      codecov_flag:
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  detemine-package-manager:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    outputs:
      PNPM: ${{ steps.check.outputs.PNPM }}
      PNPM_VERSION: ${{ steps.check.outputs.PNPM_VERSION }}
    steps:
      - uses: actions/checkout@v6

      - id: check
        name: Check PNPM package
        run: |
          if [ -f "pnpm-lock.yaml" ] || ([ -f "package.json" ] && [[ "$(jq -r '.packageManager // ""' package.json)" == "pnpm"* ]]); then
            echo "PNPM=yes" >> "$GITHUB_OUTPUT"
          else
            echo "PNPM=no" >> "$GITHUB_OUTPUT"
          fi

          # Prefer the version pinned in package.json's packageManager field
          # (if present) over the pnpm_version input, since pnpm/action-setup@v6
          # hard-errors when an explicit version conflicts with packageManager.
          PM_FIELD=$(jq -r '.packageManager // ""' package.json 2>/dev/null || echo "")
          if [[ "$PM_FIELD" == pnpm@* ]]; then
            PM_VERSION="${PM_FIELD#pnpm@}"
            PM_VERSION="${PM_VERSION%%+*}"
            echo "PNPM_VERSION=${PM_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "PNPM_VERSION=${{ inputs.pnpm_version }}" >> "$GITHUB_OUTPUT"
          fi

  linting-pnpm:
    needs: detemine-package-manager
    if: ${{ needs.detemine-package-manager.outputs.PNPM == 'yes' }}
    strategy:
      fail-fast: true
      matrix:
        node-version: ["${{ inputs.node_version }}"]
        pnpm-version: ["${{ needs.detemine-package-manager.outputs.PNPM_VERSION }}"]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: ${{ matrix.pnpm-version }}
          run_install: false
      - name: Check for pnpm-lock.yaml
        id: check_pnpm_lock
        run: |
          if [ -f "${{ inputs.working_directory }}/pnpm-lock.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - name: Use Node.js ${{ matrix.node-version }} (with cache)
        if: steps.check_pnpm_lock.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: ${{ inputs.working_directory }}/pnpm-lock.yaml
      - name: Use Node.js ${{ matrix.node-version }} (no cache)
        if: steps.check_pnpm_lock.outputs.exists == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: |
          PNPM_VER=$(pnpm --version)
          echo "PNPM version: ${PNPM_VER}"


          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare 2>/dev/null || true
        continue-on-error: true
      - name: Linting
        run: |
          pnpm run lint

  unit-testing-pnpm:
    needs: [linting-pnpm, detemine-package-manager]
    strategy:
      fail-fast: true
      matrix:
        node-version: ["${{ inputs.node_version }}"]
        pnpm-version: ["${{ needs.detemine-package-manager.outputs.PNPM_VERSION }}"]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: ${{ matrix.pnpm-version }}
          run_install: false
      - name: Check for pnpm-lock.yaml
        id: check_pnpm_lock
        run: |
          if [ -f "${{ inputs.working_directory }}/pnpm-lock.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - name: Use Node.js ${{ matrix.node-version }} (with cache)
        if: steps.check_pnpm_lock.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: ${{ inputs.working_directory }}/pnpm-lock.yaml
      - name: Use Node.js ${{ matrix.node-version }} (no cache)
        if: steps.check_pnpm_lock.outputs.exists == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Debug files
        run: |
          pwd
          ls -la
      - name: Copy .env
        run: |
          cp .env.example .env 2>/dev/null || :
          cp .env.sample .env 2>/dev/null || :
          cp env.example .env 2>/dev/null || :
          cp env.sample .env 2>/dev/null || :
      - name: Install dependencies
        run: |
          PNPM_VER=$(pnpm --version)
          echo "PNPM version: ${PNPM_VER}"


          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare 2>/dev/null || true
        continue-on-error: true
      - name: Testing
        run: |
          pnpm run test
      - name: "Upload Coverage"
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coveragefile
          path: tests/coverage

  verify-build:
    needs: [linting-pnpm, detemine-package-manager]
    strategy:
      fail-fast: true
      matrix:
        node-version: ["${{ inputs.node_version }}"]
        pnpm-version: ["${{ needs.detemine-package-manager.outputs.PNPM_VERSION }}"]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: ${{ matrix.pnpm-version }}
          run_install: false
      - name: Check for pnpm-lock.yaml
        id: check_pnpm_lock
        run: |
          if [ -f "${{ inputs.working_directory }}/pnpm-lock.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - name: Use Node.js ${{ matrix.node-version }} (with cache)
        if: steps.check_pnpm_lock.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: ${{ inputs.working_directory }}/pnpm-lock.yaml
      - name: Use Node.js ${{ matrix.node-version }} (no cache)
        if: steps.check_pnpm_lock.outputs.exists == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: |
          PNPM_VER=$(pnpm --version)
          echo "PNPM version: ${PNPM_VER}"


          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare 2>/dev/null || true
        continue-on-error: true
      - name: Rebuild native addons
        run: |
          BSQ_DIR=$(ls -d node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3 2>/dev/null | head -1 || true)
          if [ -n "$BSQ_DIR" ]; then
            echo "Compiling native addon in: $BSQ_DIR"
            (cd "$BSQ_DIR" && npx --yes node-gyp rebuild --release 2>&1) && echo "better-sqlite3 compiled" || echo "Compilation failed (non-fatal)"
          else
            echo "better-sqlite3 not found in .pnpm, skipping"
          fi
        continue-on-error: true
      - name: Verify build
        run: |
          pnpm run build-check

  linting-npm:
    needs: detemine-package-manager
    if: ${{ needs.detemine-package-manager.outputs.PNPM == 'no' }}
    strategy:
      fail-fast: true
      matrix:
        node-version: ["${{ inputs.node_version }}"]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare 2>/dev/null || true
        continue-on-error: true
      - name: Linting
        run: |
          npm run lint

  unit-testing-npm:
    needs: linting-npm
    strategy:
      fail-fast: true
      matrix:
        node-version: ["${{ inputs.node_version }}"]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - name: Debug files
        run: |
          pwd
          ls -la
      - name: Copy .env
        run: |
          cp .env.example .env 2>/dev/null || :
          cp .env.sample .env 2>/dev/null || :
          cp env.example .env 2>/dev/null || :
          cp env.sample .env 2>/dev/null || :
      - name: Install dependencies
        run: |
          npm ci
      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare 2>/dev/null || true
        continue-on-error: true
      - name: Testing
        run: |
          npm run test
      - name: "Upload Coverage"
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coveragefile
          path: tests/coverage

  verify-build-npm:
    needs: linting-npm
    strategy:
      fail-fast: true
      matrix:
        node-version: ["${{ inputs.node_version }}"]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
      - name: Nuxt Prepare
        run: pnpm exec nuxt prepare 2>/dev/null || true
        continue-on-error: true
      - name: Verify build
        run: |
          npm run build-check
